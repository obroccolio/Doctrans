<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctrans - 文档翻译工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f3ff;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .upload-text {
            color: #666;
            margin-bottom: 8px;
        }
        .upload-hint {
            color: #999;
            font-size: 14px;
        }
        .file-input {
            display: none;
        }
        .file-name {
            background: #f0f3ff;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        .file-name.show {
            display: flex;
        }
        .file-name span {
            color: #333;
            font-weight: 500;
        }
        .file-name button {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
        }
        .options {
            margin-bottom: 24px;
        }
        .option-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .option-group {
            flex: 1;
        }
        .option-group label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .option-group select, .option-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .option-group select:focus, .option-group input:focus {
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .progress-container {
            display: none;
            margin-top: 24px;
        }
        .progress-container.show {
            display: block;
        }
        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .result {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: #f0fff4;
            border-radius: 8px;
            text-align: center;
        }
        .result.show {
            display: block;
        }
        .result.error {
            background: #fff0f0;
        }
        .result h3 {
            color: #22c55e;
            margin-bottom: 12px;
        }
        .result.error h3 {
            color: #ef4444;
        }
        .translation-list {
            display: none;
            margin-top: 24px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .translation-list.show {
            display: block;
        }
        .translation-list-header {
            padding: 12px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
        }
        .translation-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            animation: fadeIn 0.3s ease;
        }
        .translation-item:last-child {
            border-bottom: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; background: #fffbeb; }
            to { opacity: 1; background: white; }
        }
        .translation-item.processing {
            background: #fffbeb;
        }
        .translation-original {
            color: #666;
            font-size: 13px;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .translation-result {
            color: #333;
            font-weight: 500;
            word-break: break-word;
        }
        .current-batch {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: #fffbeb;
            border-radius: 8px;
            border-left: 4px solid #f59e0b;
        }
        .current-batch.show {
            display: block;
        }
        .current-batch-title {
            font-size: 12px;
            color: #92400e;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .current-batch-items {
            font-size: 13px;
            color: #78350f;
        }
        .current-batch-item {
            padding: 4px 0;
            border-bottom: 1px dashed #fcd34d;
        }
        .current-batch-item:last-child {
            border-bottom: none;
        }
        .download-btn {
            display: inline-block;
            padding: 10px 24px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            margin-top: 8px;
        }
        .download-btn:hover {
            background: #16a34a;
        }
        .toggle-options {
            text-align: center;
            margin-bottom: 16px;
        }
        .toggle-options button {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }
        .advanced-options {
            display: none;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        .advanced-options.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Doctrans</h1>
            <p class="subtitle">文档智能翻译工具 (PPT & PDF)如果是PDF的slides，推荐转换成ppt之后翻译【对原排版有更好支持】</p>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <p class="upload-text">点击或拖拽上传文件</p>
                <p class="upload-hint">支持 .pptx 和 .pdf 格式</p>
                <input type="file" class="file-input" id="fileInput" accept=".pptx,.pdf">
            </div>

            <div class="file-name" id="fileName">
                <span id="fileNameText"></span>
                <button onclick="clearFile()">&times;</button>
            </div>

            <div class="options">
                <div class="option-row">
                    <div class="option-group">
                        <label>源语言</label>
                        <select id="sourceLang">
                            <option value="en">英语</option>
                            <option value="zh">中文</option>
                            <option value="ja">日语</option>
                            <option value="ko">韩语</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label>目标语言</label>
                        <select id="targetLang">
                            <option value="zh">中文</option>
                            <option value="en">英语</option>
                            <option value="ja">日语</option>
                            <option value="ko">韩语</option>
                        </select>
                    </div>
                </div>

                <div class="option-row">
                    <div class="option-group" style="flex: none;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" id="keepOriginalTerms" style="width: auto;">
                            <span>保留关键词原文</span>
                        </label>
                        <p style="font-size: 12px; color: #999; margin-top: 4px;">翻译时在专业术语后标注原文</p>
                    </div>
                </div>

                <div class="toggle-options">
                    <button onclick="toggleAdvanced()">高级选项 ▼</button>
                </div>

                <div class="advanced-options" id="advancedOptions">
                    <div class="option-row">
                        <div class="option-group">
                            <label>模型</label>
                            <input type="text" id="model" placeholder="gpt-4o-mini">
                        </div>
                    </div>
                    <div class="option-row">
                        <div class="option-group">
                            <label>API 地址</label>
                            <input type="text" id="baseUrl" placeholder="使用配置文件默认值">
                        </div>
                    </div>
                    <div class="option-row">
                        <div class="option-group">
                            <label>API Key</label>
                            <input type="password" id="apiKey" placeholder="使用配置文件默认值">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn" id="translateBtn" onclick="startTranslation()">开始翻译</button>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">准备中...</p>

                <div class="current-batch" id="currentBatch">
                    <div class="current-batch-title">正在翻译:</div>
                    <div class="current-batch-items" id="currentBatchItems"></div>
                </div>
            </div>

            <div class="translation-list" id="translationList">
                <div class="translation-list-header">翻译结果 (<span id="translationCount">0</span> 条)</div>
                <div id="translationItems"></div>
            </div>

            <div class="result" id="result">
                <h3 id="resultTitle">翻译完成!</h3>
                <p id="resultText"></p>
                <button class="btn" id="retryBtn" onclick="retryFailed()" style="display: none; margin-top: 12px;">重试失败内容</button>
                <a class="download-btn" id="downloadBtn" href="#">下载翻译文件</a>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let currentTaskId = null;
        let displayedTranslations = new Set();

        // Load default config
        fetch('/api/config')
            .then(response => {
                if (!response.ok) {
                    throw new Error('加载默认配置失败');
                }
                return response.json();
            })
            .then(config => {
                document.getElementById('model').placeholder = config.model || 'gpt-4o-mini';
                document.getElementById('sourceLang').value = config.source_lang || 'en';
                document.getElementById('targetLang').value = config.target_lang || 'zh';
            })
            .catch(error => {
                console.error(error);
            });

        // Upload area events
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                handleFile(fileInput.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.endsWith('.pptx') && !file.name.endsWith('.pdf')) {
                alert('请上传 .pptx 或 .pdf 格式的文件');
                return;
            }
            selectedFile = file;
            document.getElementById('fileNameText').textContent = file.name;
            document.getElementById('fileName').classList.add('show');
            uploadArea.style.display = 'none';
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('fileName').classList.remove('show');
            uploadArea.style.display = 'block';
            document.getElementById('result').classList.remove('show');
            document.getElementById('progressContainer').classList.remove('show');
        }

        function toggleAdvanced() {
            document.getElementById('advancedOptions').classList.toggle('show');
        }

        async function resetTranslationState() {
            displayedTranslations = new Set();
            document.getElementById('translationItems').innerHTML = '';
            document.getElementById('translationCount').textContent = '0';
            document.getElementById('translationList').classList.remove('show');
            document.getElementById('currentBatch').classList.remove('show');
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
        }

        async function startTranslation() {
            if (!selectedFile) {
                alert('请先上传文件');
                return;
            }

            const btn = document.getElementById('translateBtn');
            btn.disabled = true;
            await resetTranslationState();
            document.getElementById('progressContainer').classList.add('show');
            document.getElementById('result').classList.remove('show');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '上传中...';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('source_lang', document.getElementById('sourceLang').value);
            formData.append('target_lang', document.getElementById('targetLang').value);

            const model = document.getElementById('model').value;
            const baseUrl = document.getElementById('baseUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const keepOriginalTerms = document.getElementById('keepOriginalTerms').checked;

            if (model) formData.append('model', model);
            if (baseUrl) formData.append('base_url', baseUrl);
            if (apiKey) formData.append('api_key', apiKey);
            if (keepOriginalTerms) formData.append('keep_original_terms', 'true');

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Upload failed');
                }

                currentTaskId = data.task_id;
                pollStatus();
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
            }
        }

        async function retryFailed() {
            if (!currentTaskId) {
                return;
            }

            const retryBtn = document.getElementById('retryBtn');
            retryBtn.disabled = true;
            document.getElementById('translateBtn').disabled = true;
            await resetTranslationState();
            document.getElementById('progressContainer').classList.add('show');
            document.getElementById('result').classList.remove('show');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '正在重试失败内容...';
            document.getElementById('currentBatch').classList.remove('show');

            try {
                const response = await fetch(`/api/retry/${currentTaskId}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Retry failed');
                }

                pollStatus();
            } catch (error) {
                showError(error.message);
            } finally {
                retryBtn.disabled = false;
            }
        }

        async function pollStatus() {
            if (!currentTaskId) return;

            try {
                const response = await fetch(`/api/status/${currentTaskId}`);
                const data = await response.json();

                document.getElementById('progressFill').style.width = data.progress + '%';

                const processed = data.processed || 0;
                const total = data.total || 0;
                const failedCount = data.failed_count || 0;
                const statusText = data.status === 'completed_with_failures'
                    ? `翻译完成，但有 ${failedCount} 条保留原文`
                    : `翻译中... ${processed}/${total} (${data.progress}%)`;
                document.getElementById('progressText').textContent = statusText;

                if (data.current_batch && data.current_batch.length > 0) {
                    document.getElementById('currentBatch').classList.add('show');
                    const batchHtml = data.current_batch.map(text =>
                        `<div class="current-batch-item">${escapeHtml(text.substring(0, 80))}${text.length > 80 ? '...' : ''}</div>`
                    ).join('');
                    document.getElementById('currentBatchItems').innerHTML = batchHtml;
                } else {
                    document.getElementById('currentBatch').classList.remove('show');
                }

                if (data.translations && data.translations.length > 0) {
                    document.getElementById('translationList').classList.add('show');
                    document.getElementById('translationCount').textContent = data.translations.length;

                    const itemsContainer = document.getElementById('translationItems');
                    data.translations.forEach((item, index) => {
                        const key = `${index}-${item.original}`;
                        if (!displayedTranslations.has(key)) {
                            displayedTranslations.add(key);
                            const div = document.createElement('div');
                            div.className = 'translation-item';
                            div.innerHTML = `
                                <div class="translation-original">${escapeHtml(item.original)}</div>
                                <div class="translation-result">${escapeHtml(item.translated)}</div>
                            `;
                            itemsContainer.appendChild(div);
                            document.getElementById('translationList').scrollTop = document.getElementById('translationList').scrollHeight;
                        }
                    });
                }

                if (data.status === 'completed') {
                    showSuccess();
                } else if (data.status === 'completed_with_failures') {
                    showPartialSuccess(data.failed_count || 0);
                } else if (data.status === 'failed') {
                    showError(data.error || 'Translation failed');
                } else {
                    setTimeout(pollStatus, 500);
                }
            } catch (error) {
                showError(error.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showSuccess() {
            document.getElementById('translateBtn').disabled = false;
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('retryBtn').disabled = false;
            document.getElementById('progressContainer').classList.remove('show');
            document.getElementById('result').classList.remove('error');
            document.getElementById('result').classList.add('show');
            document.getElementById('resultTitle').textContent = '翻译完成!';
            document.getElementById('resultText').textContent = '点击下方按钮下载翻译后的文件';
            document.getElementById('downloadBtn').href = `/api/download/${currentTaskId}`;
            document.getElementById('downloadBtn').style.display = 'inline-block';
        }

        function showPartialSuccess(failedCount) {
            document.getElementById('translateBtn').disabled = false;
            document.getElementById('progressContainer').classList.remove('show');
            document.getElementById('result').classList.remove('error');
            document.getElementById('result').classList.add('show');
            document.getElementById('resultTitle').textContent = '翻译部分完成';
            document.getElementById('resultText').textContent = `有 ${failedCount} 条内容暂时保留原文，你可以先下载文件，或重试失败内容。`;
            document.getElementById('retryBtn').style.display = 'block';
            document.getElementById('retryBtn').disabled = false;
            document.getElementById('downloadBtn').href = `/api/download/${currentTaskId}`;
            document.getElementById('downloadBtn').style.display = 'inline-block';
        }

        function showError(message) {
            document.getElementById('translateBtn').disabled = false;
            document.getElementById('progressContainer').classList.remove('show');
            document.getElementById('result').classList.add('error');
            document.getElementById('result').classList.add('show');
            document.getElementById('resultTitle').textContent = '翻译失败';
            document.getElementById('resultText').textContent = message;
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('retryBtn').disabled = false;
            document.getElementById('downloadBtn').style.display = 'none';
        }
    </script>
</body>
</html>
